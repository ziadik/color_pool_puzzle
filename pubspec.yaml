name: color_pool_puzzle
description: Ball puzzle game with walls and holes
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.4
  audioplayers: ^6.6.0
  vibration: ^3.1.8
  provider: ^6.1.5+1
